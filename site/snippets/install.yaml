# Canonical install commands — parsed into site at build time, validated per release.
# Keys are referenced from Astro pages via snippet() calls.

quick_install:
  cmd: "curl -fsSL https://omegon.styrene.io/install.sh | sh"
  desc: "Quick install — downloads latest signed binary"

install_custom_dir:
  cmd: "curl -fsSL https://omegon.styrene.io/install.sh | INSTALL_DIR=~/.local/bin sh"
  desc: "Install to a custom directory"

install_rc:
  cmd: "curl -fsSL https://omegon.styrene.io/install.sh | sh -s -- --channel=rc"
  desc: "Install latest RC"

install_nightly:
  cmd: "curl -fsSL https://omegon.styrene.io/install.sh | sh -s -- --channel=nightly"
  desc: "Install latest nightly"

install_version:
  cmd: "curl -fsSL https://omegon.styrene.io/install.sh | sh -s -- --version=v0.17.0"
  desc: "Install a specific version (stable, RC, or nightly)"

install_ci:
  cmd: "curl -fsSL https://omegon.styrene.io/install.sh | sh -s -- --no-confirm"
  desc: "Non-interactive install (CI)"

brew_stable:
  cmd: |
    brew tap styrene-lab/tap
    brew install omegon
  desc: "Homebrew stable install"

brew_rc:
  cmd: |
    brew tap styrene-lab/tap
    brew install styrene-lab/tap/omegon-rc
  desc: "Homebrew RC channel install"

brew_switch_stable:
  cmd: |
    brew unlink omegon-rc
    brew install omegon
  desc: "Switch from RC back to stable Homebrew"

brew_upgrade_stable:
  cmd: "brew upgrade omegon"
  desc: "Update stable Homebrew install"

brew_upgrade_rc:
  cmd: "brew upgrade styrene-lab/tap/omegon-rc"
  desc: "Update RC Homebrew install"

update_script:
  cmd: "curl -fsSL https://omegon.styrene.io/install.sh | sh"
  desc: "Re-run install script to update"
