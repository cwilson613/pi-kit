name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build omegon binary
        run: cargo build -p omegon

      - name: Run cargo tests
        run: cargo test -p omegon

      - name: Extension install integration tests
        run: cargo test -p omegon --test extension_install_blackbox -- --test-threads=1

      - name: Smoke reference daemon launcher
        run: |
          python3 scripts/launch_omegon_daemon.py \
            --binary target/debug/omegon \
            --cwd "$PWD" \
            --model anthropic:claude-sonnet-4-6 \
            --control-port 7856 \
            --strict-port

      - name: Install Python dependencies for benchmark validation
        run: pip install pyyaml

      - name: Validate benchmark task definitions
        run: |
          python3 -c "
          import yaml, sys, os
          tasks = [f for f in os.listdir('ai/benchmarks/tasks') if f.endswith('.yaml')]
          if not tasks:
              print('No benchmark tasks found'); sys.exit(1)
          errors = []
          for task_file in sorted(tasks):
              path = os.path.join('ai/benchmarks/tasks', task_file)
              with open(path) as f:
                  task = yaml.safe_load(f)
              if not task.get('id'):
                  errors.append(f'{task_file}: missing id')
              if not task.get('acceptance'):
                  errors.append(f'{task_file}: missing acceptance')
              if not task.get('budget'):
                  errors.append(f'{task_file}: missing budget')
              print(f'  {task_file}: ok ({task.get(\"id\", \"?\")})')
          if errors:
              for e in errors: print(f'ERROR: {e}', file=sys.stderr)
              sys.exit(1)
          print(f'{len(tasks)} benchmark tasks validated')
          "

      - name: Validate benchmark harness loads
        run: |
          python3 -c "
          import importlib.util, sys
          spec = importlib.util.spec_from_file_location('harness', 'scripts/benchmark_harness.py')
          mod = importlib.util.module_from_spec(spec)
          try:
              spec.loader.exec_module(mod)
              print('benchmark_harness.py: loads without error')
          except Exception as e:
              print(f'ERROR: {e}', file=sys.stderr)
              sys.exit(1)
          "

  site:
    name: Site build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        run: cd site && npm ci

      - name: Build design tree SVG
        run: cd site && node scripts/build-design-tree.mjs

      - name: Build Astro site
        run: cd site && npx astro build
