name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build omegon binary
        run: cd core && cargo build -p omegon

      - name: Run cargo tests
        run: cd core && cargo test -p omegon

      - name: Smoke reference daemon launcher
        run: |
          python3 scripts/launch_omegon_daemon.py \
            --binary core/target/debug/omegon \
            --cwd "$PWD" \
            --model anthropic:claude-sonnet-4-6 \
            --control-port 7856 \
            --strict-port

  site:
    name: Site build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        run: cd site && npm ci

      - name: Build design tree SVG
        run: cd site && node scripts/build-design-tree.mjs

      - name: Build Astro site
        run: cd site && npx astro build
